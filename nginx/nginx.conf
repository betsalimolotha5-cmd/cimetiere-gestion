# ============================================
# Configuration Nginx principale
# Reverse proxy pour l'application de gestion de cimetière
# ============================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # === CONFIGURATION DE BASE ===
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # === LOGS ===
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    
    # === PERFORMANCE ===
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;  # Taille max des uploads (PDF, images)
    
    # === COMPRESSION GZIP ===
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;
    
    # === SÉCURITÉ ===
    # Masquer la version de Nginx
    server_tokens off;
    
    # Headers de sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # === UPSTREAM (Gunicorn) ===
    upstream django {
        server web:8000;
    }
    
    # === SERVEUR HTTP (Redirection vers HTTPS en production) ===
    server {
        listen 80;
        server_name localhost;
        
        # En production, décommenter pour forcer HTTPS
        # return 301 https://$server_name$request_uri;
        
        # === FICHIERS STATIQUES ===
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # === FICHIERS MÉDIA (uploads) ===
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
            
            # Protection contre l'exécution de scripts
            location ~* \.(php|pl|py|pl|cgi)$ {
                deny all;
            }
        }
        
        # === API DJANGO ===
        location /api/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }
        
        # === ADMIN DJANGO ===
        location /admin/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Protection par IP (optionnel en production)
            # allow 192.168.1.0/24;
            # deny all;
        }
        
        # === APPLICATION PRINCIPALE ===
        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSockets (si utilisé)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        # === HEALTHCHECK ===
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # === BLOCAGE DES FICHIERS SENSIBLES ===
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        location ~* \.(env|git|htaccess|htpasswd)$ {
            deny all;
        }
    }
    
    # === SERVEUR HTTPS (Production) ===
    # Décommenter et configurer avec vos certificats SSL
    # server {
    #     listen 443 ssl http2;
    #     server_name votre-domaine.com;
    #     
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     
    #     # Configuration SSL moderne
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_session_tickets off;
    #     
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #     
    #     # Même configuration que le serveur HTTP
    #     location /static/ {
    #         alias /app/staticfiles/;
    #         expires 30d;
    #         add_header Cache-Control "public, immutable";
    #     }
    #     
    #     location /media/ {
    #         alias /app/media/;
