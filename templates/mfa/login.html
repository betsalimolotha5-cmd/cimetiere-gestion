{% extends "base.html" %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card shadow-lg border-0" style="border-radius: 15px; margin-top: 40px;">
                <div class="card-body p-4 p-md-5">
                    
                    <!-- En-tête -->
                    <div class="text-center mb-4">
                        <div class="mb-3">
                            <i class="fas fa-monument fa-4x" style="color: #2c5f2d;"></i>
                        </div>
                        <h2 class="fw-bold" style="color: #2c5f2d;">Gestion Cimetière</h2>
                        <p class="text-muted">Connectez-vous à votre espace sécurisé</p>
                    </div>

                    <!-- Formulaire de connexion -->
                    <form method="post" action="{% url 'login' %}">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">
                                <i class="fas fa-envelope me-1"></i> Adresse email
                            </label>
                            <input 
                                type="email" 
                                class="form-control form-control-lg" 
                                id="email" 
                                name="email" 
                                placeholder="votre@email.com"
                                required
                                autofocus
                                style="border-radius: 10px;"
                            >
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold">
                                <i class="fas fa-lock me-1"></i> Mot de passe
                            </label>
                            <input 
                                type="password" 
                                class="form-control form-control-lg" 
                                id="password" 
                                name="password" 
                                placeholder="••••••••"
                                required
                                style="border-radius: 10px;"
                            >
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-lg text-white" style="background-color: #2c5f2d; border-radius: 10px;">
                                <i class="fas fa-sign-in-alt me-2"></i> Se connecter
                            </button>
                        </div>

			<div class="text-center mt-3">
   				 <small class="text-muted">
      				  Pas encore de compte ? 
       				 <a href="{% url 'register' %}" style="color: var(--primary-color); font-weight: 600;">
          			  Créer un compte
        				</a>
   				 </small>
			</div>
                    </form>

                    <hr class="my-4">
                    
                    <div class="text-center">
                        <small class="text-muted">
                            <i class="fas fa-shield-alt me-1"></i> 
                            Authentification sécurisée à double facteur (MFA)
                        </small>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
