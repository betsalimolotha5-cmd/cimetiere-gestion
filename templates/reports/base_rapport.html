<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Rapport{% endblock %}</title>
    <style>
        body { font-family: 'Helvetica', sans-serif; color: #333; line-height: 1.5; }
        .header { border-bottom: 3px solid #2E7D32; padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { color: #2E7D32; margin: 0; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        table th { background-color: #2E7D32; color: white; padding: 12px; text-align: left; }
        table td { padding: 10px; border-bottom: 1px solid #eee; }
        .footer { margin-top: 50px; text-align: center; font-size: 9pt; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏛️ CIMETIÈRE - RAPPORT</h1>
        <p>Gestion Funéraire</p>
    </div>
    
    {% block content %}{% endblock %}
    
    <div class="footer">
        <p>Généré le {{ date_generation|date:"d/m/Y à H:i" }}</p>
        <p>© 2026 - Service de Gestion Funéraire</p>
    </div>
</body>
</html>
