# ============================================
# Configuration pytest pour l'application
# Application de Gestion de Cimetière
# ============================================

[pytest]
# Configuration Django
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py

# Répertoires de tests
testpaths = tests

# Options par défaut
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes
    --nomigrations
    --reuse-db

# Marqueurs personnalisés
markers =
    slow: tests lents (deselect with '-m "not slow"')
    integration: tests d'intégration
    unit: tests unitaires
    smoke: tests rapides de vérification
    api: tests de l'API
    frontend: tests du frontend Flet

# Filtres d'avertissements
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    error::RuntimeWarning

# Timeout par défaut (en secondes)
timeout = 60

# Couverture de code
[coverage:run]
source = apps,frontend
omit = 
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*
    manage.py
    config/wsgi.py
    config/asgi.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
show_missing = True
fail_under = 70